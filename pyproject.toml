#
# Use this configuration file to control what RobotPy packages are installed
# on your RoboRIO
#

[tool.robotpy]

# Version of robotpy this project depends on
robotpy_version = "2026.2.1.1"

# Which core WPILib components should be installed
# This is different than 'requires' below by 
# keeping these versions on par with robotpy version
# -> equivalent to `pip install robotpy[extra1, ...]
components = [
    "commands2",
    "pathplannerlib",
    # "all",
    # "apriltag",
    # "cscore",
    # "romi",
    # "sim",
    # "xrp",
]

# Other pip packages to install (including vendor packages)
requires = [
    "phoenix6~=26.1",
    "photonlibpy",
    "pynetworktables",
    "robotpy-rev",
    # "robotpy-navx",
    # "robotpy-playingwithfusion",
    ]
